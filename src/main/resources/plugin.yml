name: PaperTpa
version: v2.0.0-Alpha+1
main: dev.indrajeeth.papertpa.PaperTpa
api-version: 1.21
description: Simple, powerful teleport requests for Minecraft servers
authors: ["IndrajeethY"]
website: https://github.com/Praveenkumar801/PaperTpa
depend: []
softdepend: [PlaceholderAPI, ItemsAdder, LuckPerms]

commands:
  tpa:
    description: Send a teleport request to a player
    usage: /tpa <player>
    permission: papertpa.tpa
    permission-message: "&cYou don't have permission. Required: papertpa.tpa"
  tpaccept:
    description: Accept a teleport request
    usage: /tpaccept [player]
    permission: papertpa.tpaccept
    permission-message: "&cYou don't have permission. Required: papertpa.tpaccept"
  tpdeny:
    description: Deny a teleport request
    usage: /tpdeny [player]
    permission: papertpa.tpdeny
    permission-message: "&cYou don't have permission. Required: papertpa.tpdeny"
  tptoggle:
    description: Toggle receiving teleport requests on/off
    usage: /tptoggle
    permission: papertpa.toggle
    permission-message: "&cYou don't have permission. Required: papertpa.toggle"
  tpcancel:
    description: Cancel your pending request or warmup teleport
    usage: /tpcancel
    permission: papertpa.tpa
    permission-message: "&cYou don't have permission. Required: papertpa.tpa"
  tplist:
    description: List all your pending teleport requests
    usage: /tplist
    permission: papertpa.tpa
    permission-message: "&cYou don't have permission. Required: papertpa.tpa"
  tpaview:
    description: Open the GUI for an incoming TPA request
    usage: /tpaview <player>
    permission: papertpa.tpa
    permission-message: "&cYou don't have permission. Required: papertpa.tpa"
  tpnotify:
    description: Toggle the post-teleport rating notification
    usage: /tpnotify
    permission: papertpa.tpa
    permission-message: "&cYou don't have permission. Required: papertpa.tpa"
  tpauto:
    description: Toggle auto-accept for all incoming teleport requests
    usage: /tpauto
    permission: papertpa.auto
    permission-message: "&cYou don't have permission. Required: papertpa.auto"
  tprate:
    description: Open the rating GUI for your last teleport
    usage: /tprate
    permission: papertpa.tpa
    permission-message: "&cYou don't have permission. Required: papertpa.tpa"
  tpstats:
    description: View your own TPA statistics
    usage: /tpstats [player]
    permission: papertpa.tpa
    permission-message: "&cYou don't have permission. Required: papertpa.tpa"
  tpsettings:
    description: Open your TPA settings GUI
    usage: /tpsettings
    permission: papertpa.tpa
    permission-message: "&cYou don't have permission. Required: papertpa.tpa"
  papertpa:
    description: PaperTpa admin commands
    usage: /papertpa reload
    permission: papertpa.admin
    permission-message: "&cYou don't have permission. Required: papertpa.admin"

permissions:
  papertpa.tpa:
    description: Send/cancel/list/view/notify/rate teleport requests
    default: true
  papertpa.tpaccept:
    description: Accept incoming teleport requests
    default: true
  papertpa.tpdeny:
    description: Deny incoming teleport requests
    default: true
  papertpa.toggle:
    description: Toggle receiving teleport requests on or off
    default: true
  papertpa.auto:
    description: Toggle auto-accept for all incoming teleport requests
    default: true
  papertpa.admin:
    description: Reload the plugin configuration
    default: op
  papertpa.bypass:
    description: Bypass targets that have teleport requests disabled
    default: op
  papertpa.cooldown.bypass:
    description: Skip the send-cooldown between requests
    default: op
  papertpa.delay.bypass:
    description: Skip the warmup countdown before teleporting
    default: op
  papertpa.stats.others:
    description: View other players' TPA statistics via /tpstats <player>
    default: op
  papertpa.immunity.bypass:
    description: This player's attacks can still hit post-teleport immune players
    default: op
  papertpa.*:
    description: All PaperTpa permissions
    default: op
    children:
      papertpa.tpa: true
      papertpa.tpaccept: true
      papertpa.tpdeny: true
      papertpa.toggle: true
      papertpa.auto: true
      papertpa.admin: true
      papertpa.bypass: true
      papertpa.cooldown.bypass: true
      papertpa.delay.bypass: true
      papertpa.stats.others: true
      papertpa.immunity.bypass: true
