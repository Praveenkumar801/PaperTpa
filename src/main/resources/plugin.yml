name: PaperTpa
version: v2.0.0-Alpha+1
main: dev.indrajeeth.papertpa.PaperTpa
api-version: 1.21
description: Simple, powerful teleport requests for Minecraft servers
authors: ["IndrajeethY"]
website: https://github.com/Praveenkumar801/PaperTpa
depend: []
softdepend: [PlaceholderAPI, ItemsAdder]

commands:
  tpa:
    description: Send a teleport request to a player
    usage: /tpa <player>
    permission: papertpa.tpa
    permission-message: "You don't have permission to use this command."
  tpaccept:
    description: Accept a teleport request
    usage: /tpaccept [player]
    permission: papertpa.tpaccept
    permission-message: "You don't have permission to use this command."
  tpdeny:
    description: Deny a teleport request
    usage: /tpdeny [player]
    permission: papertpa.tpdeny
    permission-message: "You don't have permission to use this command."
  tptoggle:
    description: Toggle teleport requests on/off
    usage: /tptoggle
    permission: papertpa.toggle
    permission-message: "You don't have permission to use this command."
  tpcancel:
    description: Cancel your pending request or teleport
    usage: /tpcancel
    permission: papertpa.tpa
    permission-message: "You don't have permission to use this command."
  tplist:
    description: List all your pending teleport requests
    usage: /tplist
    permission: papertpa.tpa
    permission-message: "You don't have permission to use this command."
  papertpa:
    description: PaperTpa admin commands
    usage: /papertpa reload
    permission: papertpa.admin
    permission-message: "You don't have permission to use this command."

permissions:
  papertpa.tpa:
    description: Send teleport requests
    default: true
  papertpa.tpaccept:
    description: Accept teleport requests
    default: true
  papertpa.tpdeny:
    description: Deny teleport requests
    default: true
  papertpa.toggle:
    description: Toggle teleport requests
    default: true
  papertpa.admin:
    description: Access admin commands
    default: op
  papertpa.bypass:
    description: Bypass disabled teleport requests
    default: op
  papertpa.cooldown.bypass:
    description: Bypass cooldown timers
    default: op
  papertpa.delay.bypass:
    description: Bypass teleport delay
    default: op
  papertpa.*:
    description: All PaperTpa permissions
    default: op
    children:
      papertpa.tpa: true
      papertpa.tpaccept: true
      papertpa.tpdeny: true
      papertpa.toggle: true
      papertpa.admin: true
      papertpa.bypass: true
      papertpa.cooldown.bypass: true
      papertpa.delay.bypass: true
