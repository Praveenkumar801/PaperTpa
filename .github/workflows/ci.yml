name: CI

on:
  push:
    branches: [main, dev]
    tags:
      - "v*"
  pull_request:
    branches: [main, dev]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Configuration cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/configuration-cache
          key: ${{ runner.os }}-configuration-cache-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-configuration-cache-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew clean build --configuration-cache

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: PaperTpa
          path: build/libs/PaperTpa-*.jar
          retention-days: 7

      - name: Publish to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            build/libs/PaperTpa-*.jar \
            --title "PaperTpa ${{ github.ref_name }}" \
            --generate-notes \
            --repo ${{ github.repository }}
